// Example entry:
// body       = name of the celestial body
// biomeIndex = index of the biome in that body's BiomeMap (0-based)
// color      = supports multiple formats:
//              - Hex: #RRGGBB or RRGGBB (e.g., #DCC8A8 or DCC8A8)
//              - Float: R,G,B as 0–1 (e.g., 0.86,0.80,0.66)
//              - Int: R,G,B as 0–255 (e.g., 220,200,168)

VO_WHEEL_DUST_COLOR
{
    body = Kerbin
    biomeIndex = 0
    color = #DCC8A8
}

// More examples:
