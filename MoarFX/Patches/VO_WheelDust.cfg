// Add dust to all wheels that use ModuleWheelBase
@PART[*]:HAS[@MODULE[ModuleWheelBase]]:FINAL
{
    MODULE
    {
        name = ModuleWheelDust

        // These can be tuned per-part if modders want
        minSpeed            = 1.0
        distanceBetweenPuffs = 0.7
        dustSize            = 0.7
        dustLifetime        = 1.2
        dustUpSpeed         = 1.0
    }
}